baseURL = "https://fxlin0261.github.io/"
title = "fxlin0261's Blog"
theme = "PaperMod"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
enableInlineShortcodes = true
enableRobotsTXT = true
hasCJKLanguage = true
summaryLength = 70

[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
env = "production"
author = "fxlin0261"
defaultTheme = "dark"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = false
ShowCodeCopyButtons = true
ShowWordCount = false
UseHugoToc = true
showtoc = true
tocopen = false
math = true
disableSpecial1stPost = true
mainSections = ["cpp", "cuda", "ml", "systems", "misc"]

[params.homeInfoParams]
Title = "fxlin"
Content = "记录 C++、CUDA、ML 和 systems 相关笔记。\n\n- [cpp](/posts/cpp/)\n- [cuda](/posts/cuda/)\n- [ml](/posts/ml/)\n- [systems](/posts/systems/)\n- [misc](/posts/misc/)\n- [GitHub](https://github.com/fxlin0261)"

[taxonomies]
series = "series"

[[menu.main]]
name = "归档"
url = "/archives/"
weight = 10

[[menu.main]]
name = "目录"
url = "/posts/"
weight = 20

[[menu.main]]
name = "搜索"
url = "/search/"
weight = 30

[[menu.main]]
name = "关于"
url = "/about/"
weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = true
  lineNumbersInTable = false
  tabWidth = 4
  style = "github-dark"
